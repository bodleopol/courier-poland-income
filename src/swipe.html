<style>
.swipe-page {
  padding: 2rem 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 80vh;
  overflow: hidden;
}

.swipe-header {
  text-align: center;
  margin-bottom: 2rem;
}

.swipe-header h1 {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

.swipe-header p {
  color: #64748b;
}

.swipe-app {
  display: flex;
  gap: 2rem;
  width: 100%;
  max-width: 1000px;
  justify-content: center;
}

.swipe-cards-container {
  position: relative;
  width: 100%;
  max-width: 400px;
  height: 500px;
  perspective: 1000px;
}

.swipe-card {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  cursor: grab;
  user-select: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
  will-change: transform;
  border: 1px solid #e2e8f0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.swipe-card:active {
  cursor: grabbing;
}

.swipe-card-content {
  flex: 1;
  overflow-y: auto;
  pointer-events: none; /* Let drag events pass through */
}

/* Hide scrollbar for card content */
.swipe-card-content::-webkit-scrollbar {
  display: none;
}

.swipe-card-category {
  font-size: 0.8rem;
  text-transform: uppercase;
  font-weight: 700;
  color: #00a67e;
  margin-bottom: 0.5rem;
}

.swipe-card-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

.swipe-card-salary {
  font-size: 1.25rem;
  font-weight: 700;
  color: #10b981;
  margin-bottom: 1rem;
}

.swipe-card-detail {
  display: flex;
  align-items: center;
  margin-bottom: 0.5rem;
  color: #475569;
  font-size: 0.95rem;
}

.swipe-card-detail i {
  margin-right: 0.5rem;
  width: 16px;
  text-align: center;
}

.swipe-card-excerpt {
  margin-top: 1rem;
  font-size: 0.95rem;
  color: #64748b;
  line-height: 1.5;
  border-top: 1px solid #e2e8f0;
  padding-top: 1rem;
}

.swipe-controls {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-top: 1.5rem;
}

.swipe-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  background: white;
}

.swipe-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.swipe-btn:active {
  transform: scale(0.95);
}

.swipe-btn-nope {
  color: #ef4444;
}

.swipe-btn-like {
  color: #10b981;
}

.swipe-cart {
  width: 100%;
  max-width: 350px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  max-height: 600px;
  border: 1px solid #e2e8f0;
}

.swipe-cart-header {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.swipe-cart-count {
  background: #00a67e;
  color: white;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.8rem;
}

.swipe-cart-list {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 1rem;
}

.swipe-cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 0;
  border-bottom: 1px solid #f1f5f9;
}

.swipe-cart-item:last-child {
  border-bottom: none;
}

.swipe-cart-item-info {
  flex: 1;
  min-width: 0;
}

.swipe-cart-item-title {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.swipe-cart-item-city {
  font-size: 0.8rem;
  color: #64748b;
}

.swipe-cart-item-remove {
  background: none;
  border: none;
  color: #ef4444;
  cursor: pointer;
  padding: 0.25rem;
  font-size: 1.2rem;
  margin-left: 0.5rem;
}

.swipe-cart-action {
  width: 100%;
}

.swipe-empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: #64748b;
}

/* Badge for Swipe Feedback */
.swipe-badge {
  position: absolute;
  top: 2rem;
  padding: 0.5rem 1rem;
  border: 4px solid;
  border-radius: 10px;
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  opacity: 0;
  z-index: 10;
  pointer-events: none;
}

.swipe-badge.like {
  color: #10b981;
  border-color: #10b981;
  right: 2rem;
  transform: rotate(15deg);
}

.swipe-badge.nope {
  color: #ef4444;
  border-color: #ef4444;
  left: 2rem;
  transform: rotate(-15deg);
}

@media (max-width: 768px) {
  .swipe-app {
    flex-direction: column;
    align-items: center;
  }

  .swipe-cart {
    max-width: 400px;
  }
}
</style>

<div class="swipe-page">
  <div class="container">
    <div class="swipe-header">
      <h1>Свайп Вакансій</h1>
      <p>Свайпай вправо, щоб зберегти. Вліво — щоб пропустити.</p>
    </div>

    <div class="swipe-app">
      <!-- Cards Section -->
      <div>
        <div class="swipe-cards-container" id="swipeCardsContainer">
          <!-- Cards will be injected here via JS -->
          <div class="swipe-empty-state" id="swipeNoMoreCards" style="display: none; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px dashed #cbd5e1; border-radius: 20px;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
            <h3>Ви переглянули всі вакансії!</h3>
            <p>Зачекайте на нові або змініть фільтри (якщо є).</p>
            <button class="btn btn-secondary" style="margin-top: 1rem;" onclick="location.reload()">Почати спочатку</button>
          </div>
        </div>

        <div class="swipe-controls" id="swipeControls">
          <button class="swipe-btn swipe-btn-nope" id="swipeBtnNope">❌</button>
          <button class="swipe-btn swipe-btn-like" id="swipeBtnLike">💚</button>
        </div>
      </div>

      <!-- Cart Section -->
      <div class="swipe-cart">
        <div class="swipe-cart-header">
          <span>Збережені</span>
          <span class="swipe-cart-count" id="swipeCartCount">0</span>
        </div>

        <div class="swipe-cart-list" id="swipeCartList">
          <div class="swipe-empty-state" id="swipeCartEmpty">
            <p>Ваш кошик порожній. Свайпайте вправо, щоб додати вакансії.</p>
          </div>
          <!-- Cart items will be injected here -->
        </div>

        <button class="btn btn-primary swipe-cart-action" id="swipeApplyAllBtn" disabled>Подати заявку на вибрані</button>
      </div>
    </div>
  </div>
</div>

<script src="/swipe.js"></script>
