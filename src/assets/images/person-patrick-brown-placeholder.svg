<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Profile placeholder</title>
  <desc id="desc">Neutral portrait placeholder for catalog profile cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="230" r="95" fill="#93c5fd"/>
  <rect x="230" y="340" width="340" height="170" rx="85" fill="#60a5fa"/>
</svg>
