<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Портрет Богдана Тютенка</title>
  <desc id="desc">Редакційний портрет: чоловік у темній сорочці на тлі синього архітектурного інтер'єру з квіткою в руці.</desc>
  <defs>
    <linearGradient id="wallBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="45%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="archShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="windowLight" x1="100%" y1="20%" x2="40%" y2="80%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8835a"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="flowerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feOffset in="b" dy="3" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Ruined interior -->
  <rect width="1200" height="900" fill="url(#wallBlue)"/>
  <path fill="#0c1929" opacity="0.35" d="M0 0h1200v900H0z"/>
  <!-- Arch openings -->
  <path fill="#1e40af" opacity="0.85" d="M80 120c0-80 120-80 120 0v520H80V120z"/>
  <path fill="url(#archShadow)" d="M80 120c0-80 120-80 120 0v520H80V120z"/>
  <path fill="#1d4ed8" opacity="0.7" d="M320 80c0-95 180-95 180 0v600H320V80z"/>
  <path fill="url(#archShadow)" d="M320 80c0-95 180-95 180 0v600H320V80z"/>
  <path fill="#2563eb" opacity="0.55" d="M920 100c0-88 200-88 200 0v580H920V100z"/>
  <!-- Light from right -->
  <path fill="url(#windowLight)" d="M1200 0L650 0 900 900h300z"/>
  <!-- Cracks -->
  <path fill="none" stroke="#0f172a" stroke-opacity="0.4" stroke-width="3" d="M200 200l40 120M1050 180l-60 200M450 120l30 80"/>
  <!-- Floor rubble -->
  <path fill="#334155" d="M0 720c180-40 380-55 600-50s420 30 600 80v150H0V720z"/>
  <path fill="#1e293b" d="M0 760l120-25 80 40-200 125zm400 20l200-30 150 50-350 100zm700-10l-100-20 100 60v90z"/>
  <ellipse cx="280" cy="820" rx="90" ry="25" fill="#475569" opacity="0.6"/>
  <ellipse cx="720" cy="835" rx="120" ry="28" fill="#64748b" opacity="0.5"/>
  <ellipse cx="980" cy="810" rx="70" ry="20" fill="#334155" opacity="0.7"/>
  <!-- Subject -->
  <g filter="url(#softShadow)" transform="translate(0 20)">
    <!-- Torso -->
    <path fill="url(#shirt)" d="M420 880c20-280 80-420 180-460s200 40 240 320l-10 100H420z"/>
    <path fill="#0f172a" opacity="0.35" d="M520 430c-40 120-50 280-40 450h200c-30-200-50-320-160-450z"/>
    <!-- Neck -->
    <path fill="url(#skin)" d="M548 420h104c0 0 8 45 6 78H542c-2-33 6-78 6-78z"/>
    <!-- Head -->
    <ellipse cx="600" cy="320" rx="118" ry="135" fill="url(#skin)"/>
    <!-- Hair -->
    <path fill="#8b5a3c" d="M482 300c12-95 95-155 200-140 85 12 130 78 125 165-8 0-22-95-118-108-95-12-165 50-175 115-12-10-32-32-32-32z"/>
    <path fill="#6d4c41" opacity="0.6" d="M500 260c40-70 110-100 190-95 50 3 95 35 115 85-45-55-130-65-200-25-45 28-75 70-105 35z"/>
    <!-- Beard -->
    <path fill="#6d4c41" d="M505 360c20 95 85 155 195 150 95-4 145-70 155-145-25 80-95 130-175 132-85 2-150-45-175-137z" opacity="0.92"/>
    <path fill="#5d4037" d="M530 400c35 55 90 88 155 88 60 0 110-30 140-82-25 55-80 92-148 95-75 3-130-35-147-101z"/>
    <!-- Face shading -->
    <ellipse cx="545" cy="335" rx="35" ry="50" fill="#92400e" opacity="0.12"/>
    <!-- Eyes -->
    <ellipse cx="555" cy="305" rx="14" ry="10" fill="#1c1917"/>
    <ellipse cx="645" cy="305" rx="14" ry="10" fill="#1c1917"/>
    <ellipse cx="558" cy="302" rx="4" ry="3" fill="#fafaf9" opacity="0.5"/>
    <ellipse cx="648" cy="302" rx="4" ry="3" fill="#fafaf9" opacity="0.5"/>
    <!-- Brow -->
    <path fill="none" stroke="#5d4037" stroke-width="5" stroke-linecap="round" d="M525 285c25-12 55-8 70 4M605 289c20-14 48-16 70-2"/>
    <!-- Nose -->
    <path fill="none" stroke="#a16207" stroke-width="3" stroke-opacity="0.35" stroke-linecap="round" d="M598 318v52M585 368h26"/>
    <!-- Mouth -->
    <path fill="none" stroke="#78350f" stroke-width="4" stroke-linecap="round" d="M565 395c25 8 50 8 72 0"/>
    <!-- Raised arm & bouquet -->
    <path fill="url(#shirt)" d="M680 480c80-120 160-200 220-240 35 25 55 60 45 95-70 45-165 130-235 220-20-25-35-55-30-75z"/>
    <path fill="#172554" opacity="0.5" d="M700 500c60-90 130-160 190-195l25 40c-55 40-120 110-175 185z"/>
    <!-- Hand area -->
    <ellipse cx="905" cy="255" rx="38" ry="32" fill="url(#skin)" transform="rotate(-15 905 255)"/>
    <!-- Bouquet -->
    <g transform="translate(860 200)">
      <path fill="#166534" d="M20 120c-10-40 5-75 25-95 15 30 10 65-5 95-8 18-15 35-20 50z"/>
      <ellipse cx="45" cy="35" rx="28" ry="32" fill="url(#flowerGlow)"/>
      <ellipse cx="45" cy="35" rx="18" ry="22" fill="#fbbf24"/>
      <circle cx="72" cy="55" r="12" fill="#fafafa"/>
      <circle cx="88" cy="42" r="9" fill="#f5f5f4"/>
      <circle cx="15" cy="58" r="10" fill="#fafafa"/>
      <path fill="#22c55e" d="M30 95c15-25 35-40 55-45-5 25-20 50-40 70-25-8-40-18-15-25z"/>
    </g>
    <!-- Collar -->
    <path fill="#1e293b" d="M520 430l80 35 80-35v20l-80 28-80-28z"/>
  </g>
</svg>
