name = "courier-poland-income"
compatibility_date = "2026-01-17"
main = "src/worker.js"

[build]
# Uses --no-frozen-lockfile to avoid lockfile config mismatch, then builds the static site.
command = "corepack enable && pnpm install --no-frozen-lockfile && node build.js"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
