name: Site quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  doorway-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Doorway / indexable content audit
        run: pnpm run audit:doorway
